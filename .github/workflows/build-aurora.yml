name: Build Aurora GLB

on:
  push:
    paths:
      - "tools/build_aurora_glb.py"
      - ".github/workflows/build-aurora.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install model tools
        run: python -m pip install --disable-pip-version-check numpy trimesh

      - name: Build Aurora GT
        run: python tools/build_aurora_glb.py

      - name: Commit generated model
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A app.js models
          if git diff --cached --quiet; then
            echo "No generated changes"
            exit 0
          fi
          git commit -m "Add detailed Aurora GT GLB model"
          git push

# Triggered after the workflow was installed.
