<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Стоимость автомобиля</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <header class="summary">
      <p class="eyebrow">Личный автомобиль</p>
      <h1>Стоимость владения</h1>

      <div class="total">
        <span id="monthlyTotal">0 ₽</span>
        <small>в месяц</small>
      </div>

      <div class="periods">
        <div>
          <span id="weeklyTotal">0 ₽</span>
          <small>в неделю</small>
        </div>
        <div>
          <span id="yearlyTotal">0 ₽</span>
          <small>в год</small>
        </div>
      </div>
    </header>

    <section class="calculator">
      <div class="expense-column">
        <label class="expense-card purchase-card">
          <span class="expense-icon">🚘</span>
          <span class="expense-info">
            <strong>Стоимость покупки</strong>
            <small>Цена автомобиля при покупке</small>
          </span>
          <span class="input-wrap">
            <input id="purchasePrice" type="number" min="0" value="1500000">
            <span>₽</span>
          </span>
        </label>

        <label class="expense-card">
          <span class="expense-icon">⛽</span>
          <span class="expense-info">
            <strong>Топливо</strong>
            <small>Расходы за месяц</small>
          </span>
          <span class="input-wrap">
            <input type="number" min="0" value="12000" data-expense>
            <span>₽</span>
          </span>
        </label>

        <label class="expense-card">
          <span class="expense-icon">🛡️</span>
          <span class="expense-info">
            <strong>Страховка</strong>
            <small>Среднее за месяц</small>
          </span>
          <span class="input-wrap">
            <input type="number" min="0" value="2500" data-expense>
            <span>₽</span>
          </span>
        </label>

        <label class="expense-card">
          <span class="expense-icon">🔧</span>
          <span class="expense-info">
            <strong>ТО и ремонт</strong>
            <small>Среднее за месяц</small>
          </span>
          <span class="input-wrap">
            <input type="number" min="0" value="4000" data-expense>
            <span>₽</span>
          </span>
        </label>
      </div>

      <div class="car-stage" aria-label="3D-модель автомобиля">
        <div id="car3d" class="car3d-view"></div>

        <div class="car-label">
          <span>Ваш автомобиль</span>
          <small>Потяните мышкой, чтобы повернуть</small>
        </div>
      </div>

      <div class="expense-column">
        <label class="expense-card depreciation-card">
          <span class="expense-icon">📉</span>
          <span class="expense-info">
            <strong>Амортизация</strong>
            <small id="monthlyDepreciation">0 ₽ в месяц</small>
          </span>
          <span class="input-wrap">
            <input id="depreciationRate" type="number" min="0" max="100" step="0.1" value="15">
            <span>% в год</span>
          </span>
        </label>

        <label class="expense-card">
          <span class="expense-icon">🅿️</span>
          <span class="expense-info">
            <strong>Парковка</strong>
            <small>Расходы за месяц</small>
          </span>
          <span class="input-wrap">
            <input type="number" min="0" value="3000" data-expense>
            <span>₽</span>
          </span>
        </label>

        <label class="expense-card">
          <span class="expense-icon">🏛️</span>
          <span class="expense-info">
            <strong>Налог</strong>
            <small>Среднее за месяц</small>
          </span>
          <span class="input-wrap">
            <input type="number" min="0" value="500" data-expense>
            <span>₽</span>
          </span>
        </label>

        <label class="expense-card">
          <span class="expense-icon">📄</span>
          <span class="expense-info">
            <strong>Кредит и прочее</strong>
            <small>Ежемесячные расходы</small>
          </span>
          <span class="input-wrap">
            <input type="number" min="0" value="0" data-expense>
            <span>₽</span>
          </span>
        </label>
      </div>
    </section>
  </main>

  <script type="module" src="app.js"></script>
</body>
</html>
